<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#f8fafc" />
<title>PRECIOS SMARTPHONE</title>
<style>
:root{--bg:#f8fafc;--panel:#fff;--soft:#eef2f7;--line:#d8e0ea;--text:#0f172a;--muted:#64748b;--accent:#ea580c;--accent-soft:#fff7ed;--ok:#15803d;--danger:#dc2626;--shadow:0 6px 18px rgba(15,23,42,.06);--r:14px}
*{box-sizing:border-box} html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;text-transform:uppercase}
body{min-height:100vh}
.wrap{max-width:760px;margin:0 auto;padding:max(10px,env(safe-area-inset-top)) 10px max(18px,env(safe-area-inset-bottom))}
.top{display:flex;justify-content:space-between;gap:8px;align-items:center;margin-bottom:8px}
.title{font-size:1rem;font-weight:900;letter-spacing:.4px;margin:0}
.badge{padding:5px 8px;border-radius:999px;background:var(--panel);border:1px solid var(--line);font-size:.62rem;color:var(--muted);white-space:nowrap}
.panel,details{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
details{overflow:hidden;margin-bottom:8px}
summary{list-style:none;padding:10px 12px;font-size:.78rem;font-weight:900;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
summary::-webkit-details-marker{display:none}
.panel{padding:10px}
.row{display:grid;gap:6px} .r2{grid-template-columns:1fr 1fr} .r3{grid-template-columns:repeat(3,minmax(0,1fr))} .r4{grid-template-columns:repeat(4,minmax(0,1fr))}
label{display:block;font-size:.60rem;color:var(--muted);font-weight:900;margin-bottom:3px;letter-spacing:.3px}
input,select,button,textarea{font:inherit}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--text);padding:10px 11px;font-size:.78rem;outline:none}
input:focus,select:focus,textarea:focus{border-color:#fdba74;box-shadow:0 0 0 3px rgba(251,146,60,.18)}
textarea{min-height:64px;resize:vertical}
button{border:0;border-radius:12px;padding:10px 12px;font-weight:900;font-size:.72rem;cursor:pointer}
.btn{background:var(--accent);color:#fff}
.btn.soft{background:var(--soft);color:var(--text);border:1px solid var(--line)}
.btn.ghost{background:#fff;color:var(--text);border:1px solid var(--line)}
.btn.danger{background:#fff1f2;color:#991b1b;border:1px solid #fecdd3}
.toolbar{display:grid;grid-template-columns:1fr .95fr auto;gap:6px;margin-bottom:8px}
.compact-note{font-size:.64rem;color:var(--muted);line-height:1.3}
.modebar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:6px}
.modebtn{background:#fff;border:1px solid var(--line);color:var(--text)}
.modebtn.active{background:var(--accent-soft);border-color:#fdba74;color:#9a3412}
.hidden{display:none !important}
.status{font-size:.68rem;color:var(--muted)}
.empty{padding:18px 12px;text-align:center;color:var(--muted);font-size:.78rem}
.group{margin-top:10px}
.grouphead{position:sticky;top:0;background:var(--bg);padding:2px 0 6px;z-index:1}
.groupchip{display:inline-flex;gap:6px;align-items:center;padding:5px 9px;border-radius:999px;background:#fff;border:1px solid var(--line);font-size:.66rem;font-weight:900}
.subhead{font-size:.68rem;color:var(--muted);font-weight:900;margin:6px 2px}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:9px;margin-bottom:7px;box-shadow:var(--shadow)}
.headline{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.name{font-size:.80rem;font-weight:900;line-height:1.15}
.meta{font-size:.60rem;color:var(--muted);font-weight:800;margin-top:3px;line-height:1.25}
.sale{text-align:right;min-width:90px}
.sale .label{font-size:.56rem;color:var(--muted);font-weight:900}
.sale .value{font-size:1rem;font-weight:900;color:var(--accent);line-height:1}
.prices{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;margin-top:8px}
.pill{background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:6px 7px;min-height:56px}
.pill .k{font-size:.54rem;color:var(--muted);font-weight:900;line-height:1.1}
.pill .v{font-size:.76rem;font-weight:900;margin-top:3px;line-height:1.1}
.pill .s{font-size:.56rem;color:var(--muted);margin-top:2px;line-height:1.1}
.pill.saleon{background:var(--accent-soft);border-color:#fdba74}
.cardfoot{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:7px}
.actions{display:flex;gap:6px}
.actions button{padding:7px 9px;font-size:.64rem;border-radius:10px}
.small{font-size:.60rem;color:var(--muted);font-weight:800}
hr.sep{border:0;border-top:1px solid var(--line);margin:8px 0}
@media (max-width:560px){.toolbar{grid-template-columns:1fr 1fr} .toolbar > *:first-child{grid-column:1/-1} .r4{grid-template-columns:1fr 1fr} .prices{grid-template-columns:1fr 1fr} .sale{min-width:76px}}
</style>
</head>

<div class="wrap">
  <div class="top">
    <h1 class="title">PRECIOS SMARTPHONE</h1>
    <div class="badge" id="countBadge">0 MODELOS</div>
  </div>

  <div class="panel" style="margin-bottom:8px;">

    <div class="compact-note">LOS MODELOS SOLO APARECEN CUANDO ESCRIBES EN BUSCAR.</div>
  </div>

  <details>
    <summary><span>CONFIGURACIÓN DE VENTA</span><span id="saleModeText">+20 NORMAL</span></summary>
    <div class="panel" style="box-shadow:none;border:0;padding-top:0;">
      <div class="row r3">
        <div>
          <label for="minAdd">SUMA MÍNIMA</label>
          <input id="minAdd" type="number" step="0.01" min="0" value="15" />
        </div>
        <div>
          <label for="normalAdd">SUMA NORMAL</label>
          <input id="normalAdd" type="number" step="0.01" min="0" value="20" />
        </div>
        <div>
          <label for="customPct">% PERSONALIZADO</label>
          <input id="customPct" type="number" step="0.01" min="0" value="12" />
        </div>
      </div>
      <div class="modebar">
        <button class="modebtn active" data-mode="normal" type="button">VENDER +20</button>
        <button class="modebtn" data-mode="min" type="button">VENDER +15</button>
        <button class="modebtn" data-mode="custom" type="button">VENDER %</button>
      </div>
      <hr class="sep">
      <div class="row r3">
        <div>
          <label for="debitPct">% DÉBITO</label>
          <input id="debitPct" type="number" step="0.01" min="0" value="2.30" />
        </div>
        <div>
          <label for="creditPct">% CRÉDITO</label>
          <input id="creditPct" type="number" step="0.01" min="0" value="5.50" />
        </div>
        <div>
          <label for="commVatPct">IVA SOBRE COMISIÓN</label>
          <input id="commVatPct" type="number" step="0.01" min="0" value="15" />
        </div>
      </div>
      <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">
        <button class="btn" id="saveSettings" type="button">GUARDAR CONFIGURACIÓN</button>
        <button class="btn ghost" id="recalcAll" type="button">RECALCULAR VISTA</button>
      </div>
      <div class="compact-note" style="margin-top:8px;">LA APP TE MUESTRA BASE, +15, +20, % QUE EQUIVALE +15, % QUE EQUIVALE +20, PRECIO CON TU % Y TAMBIÉN DÉBITO / CRÉDITO SOBRE EL PRECIO DE VENTA ACTIVO.</div>
    </div>
  </details>

  <details>
    <summary><span id="formTitle">AGREGAR EQUIPO</span><span id="formModeHint">MANUAL</span></summary>
    <div class="panel" style="box-shadow:none;border:0;padding-top:0;">
      <div class="row r2">
        <div><label for="provider">PROVEEDOR</label><input id="provider" type="text" placeholder="IMPORT ELECTRONIC" /></div>
        <div><label for="brand">MARCA</label><input id="brand" type="text" placeholder="SAMSUNG" /></div>
      </div>
      <div class="row r2" style="margin-top:6px;">
        <div><label for="model">MODELO</label><input id="model" type="text" placeholder="A17" /></div>
        <div><label for="variant">CONFIGURACIÓN</label><input id="variant" type="text" placeholder="8GB / 256GB" /></div>
      </div>
      <div class="row r2" style="margin-top:6px;">
        <div><label for="supplierPrice">PRECIO BASE PROVEEDOR</label><input id="supplierPrice" type="number" step="0.01" min="0" placeholder="145.95" /></div>
        <div><label for="notes">NOTA</label><input id="notes" type="text" placeholder="COLOR / CONDICIÓN / DETALLE" /></div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;">
        <button class="btn" id="saveItem" type="button">GUARDAR</button>
        <button class="btn ghost hidden" id="cancelEdit" type="button">CANCELAR EDICIÓN</button>
      </div>
    </div>
  </details>

  <div id="results"></div>
</div>

  const $ = s => document.querySelector(s);
  const $$ = s => Array.from(document.querySelectorAll(s));
  const els = {
    search: $('#search'), providerFilter: $('#providerFilter'), clearSearch: $('#clearSearch'),
    results: $('#results'), countBadge: $('#countBadge'), saleModeText: $('#saleModeText'),
    minAdd: $('#minAdd'), normalAdd: $('#normalAdd'), customPct: $('#customPct'),
    debitPct: $('#debitPct'), creditPct: $('#creditPct'), commVatPct: $('#commVatPct'),
    saveSettings: $('#saveSettings'), recalcAll: $('#recalcAll'),
    provider: $('#provider'), brand: $('#brand'), model: $('#model'), variant: $('#variant'), supplierPrice: $('#supplierPrice'), notes: $('#notes'),
    saveItem: $('#saveItem'), cancelEdit: $('#cancelEdit'), formTitle: $('#formTitle'), formModeHint: $('#formModeHint')
  };

  let state = {
    items: loadItems(),
    settings: loadSettings(),
    editingId: null
  };

  function loadItems(){
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return SEED_ITEMS.map(withIdAndUpdate);
      const parsed = JSON.parse(raw);
      return Array.isArray(parsed) && parsed.length ? parsed.map(withIdAndUpdate) : SEED_ITEMS.map(withIdAndUpdate);
    } catch(err) {
      return SEED_ITEMS.map(withIdAndUpdate);
    }
  }

  function withIdAndUpdate(item){
    const copy = Object.assign({}, item);
    copy.id = copy.id || cryptoRandom();
    copy.updatedAt = copy.updatedAt || nowText();
    copy.provider = up(copy.provider);
    copy.brand = up(copy.brand);
    copy.model = up(copy.model);
    copy.variant = up(copy.variant);
    copy.notes = up(copy.notes);
    copy.supplierPrice = Number(copy.supplierPrice || 0);
    return copy;
  }

  function loadSettings(){
    try {
      const raw = localStorage.getItem(SETTINGS_KEY);
      if (raw) return Object.assign(defaultSettings(), JSON.parse(raw));
    } catch(err){}
    return defaultSettings();
  }

  function defaultSettings(){
    return { minAdd:15, normalAdd:20, customPct:12, saleMode:'normal', debitPct:2.30, creditPct:5.50, commVatPct:15 };
  }

  function saveItems(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state.items)); }
  function saveSettings(){ localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.settings)); }
  function cryptoRandom(){ return 'i' + Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4); }
  function nowText(){ const d=new Date(); const p=n=>String(n).padStart(2,'0'); return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`; }
  function up(v){ return String(v||'').trim().toUpperCase(); }
  function n(v){ const x=Number(v); return Number.isFinite(x)?x:0; }
  function money(v){ return '$ ' + n(v).toFixed(2); }
  function pct(v){ return n(v).toFixed(2) + '%'; }
  function round2(v){ return Math.round((n(v)+Number.EPSILON)*100)/100; }
  function commissionMultiplier(percent){ return 1 + n(percent)/100 + (n(percent)/100)*(n(state.settings.commVatPct)/100); }
  function plusPercent(base, percent){ return round2(n(base) * (1 + n(percent)/100)); }
  function plusFixed(base, add){ return round2(n(base) + n(add)); }
  function fixedPct(base, add){ base=n(base); add=n(add); return base>0 ? round2(add/base*100) : 0; }
  function cardPrice(baseSale, percent){ return round2(n(baseSale) * commissionMultiplier(percent)); }

  function syncSettingsToUi(){
    els.minAdd.value = state.settings.minAdd;
    els.normalAdd.value = state.settings.normalAdd;
    els.customPct.value = state.settings.customPct;
    els.debitPct.value = state.settings.debitPct;
    els.creditPct.value = state.settings.creditPct;
    els.commVatPct.value = state.settings.commVatPct;
    updateModeButtons();
  }

  function readSettingsFromUi(){
    state.settings.minAdd = n(els.minAdd.value);
    state.settings.normalAdd = n(els.normalAdd.value);
    state.settings.customPct = n(els.customPct.value);
    state.settings.debitPct = n(els.debitPct.value);
    state.settings.creditPct = n(els.creditPct.value);
    state.settings.commVatPct = n(els.commVatPct.value);
  }

  function updateModeButtons(){
    $$('.modebtn').forEach(btn => btn.classList.toggle('active', btn.dataset.mode === state.settings.saleMode));
    const map = {min:`+${state.settings.minAdd} MÍNIMO`, normal:`+${state.settings.normalAdd} NORMAL`, custom:`${state.settings.customPct}% PERSONAL`};
    els.saleModeText.textContent = map[state.settings.saleMode] || map.normal;
  }

  function getSalePack(item){
    const base = n(item.supplierPrice);
    const minPrice = plusFixed(base, state.settings.minAdd);
    const normalPrice = plusFixed(base, state.settings.normalAdd);
    const customPrice = plusPercent(base, state.settings.customPct);
    const pct15 = fixedPct(base, state.settings.minAdd);
    const pct20 = fixedPct(base, state.settings.normalAdd);
    let sale = normalPrice;
    if (state.settings.saleMode === 'min') sale = minPrice;
    if (state.settings.saleMode === 'custom') sale = customPrice;
    return { base, minPrice, normalPrice, customPrice, pct15, pct20, sale, debit: cardPrice(sale, state.settings.debitPct), credit: cardPrice(sale, state.settings.creditPct) };
  }

  function buildProviderFilter(){
    const current = els.providerFilter.value || 'TODOS';
    const providers = ['TODOS', ...new Set(state.items.map(x => up(x.provider)).filter(Boolean).sort())];
    els.providerFilter.innerHTML = providers.map(p => `<option value="${p}">${p}</option>`).join('');
    els.providerFilter.value = providers.includes(current) ? current : 'TODOS';
  }

  function filteredItems(){
    const q = up(els.search.value);
    const provider = up(els.providerFilter.value);
    if (!q) return [];
    return state.items.filter(item => {
      const hitProvider = provider === 'TODOS' || up(item.provider) === provider;
      const hay = [item.provider, item.brand, item.model, item.variant, item.notes].map(up).join(' ');
      return hitProvider && hay.includes(q);
    }).sort((a,b) => {
      return up(a.provider).localeCompare(up(b.provider)) || up(a.brand).localeCompare(up(b.brand)) || up(a.model).localeCompare(up(b.model)) || up(a.variant).localeCompare(up(b.variant));
    });
  }

  function render(){
    buildProviderFilter();
    const list = filteredItems();
    els.countBadge.textContent = `${list.length} MODELOS`;
    if (!up(els.search.value)) {
      els.results.innerHTML = `<div class="panel empty">ESCRIBE EN BUSCAR PARA VER MODELOS.</div>`;
      return;
    }
    if (!list.length) {
      els.results.innerHTML = `<div class="panel empty">NO HAY RESULTADOS CON ESA BÚSQUEDA.</div>`;
      return;
    }
    let html = '';
    let lastProvider = '', lastBrand = '';
    list.forEach(item => {
      const calc = getSalePack(item);
      if (item.provider !== lastProvider) {
        html += `<div class="group"><div class="grouphead"><span class="groupchip">PROVEEDOR: ${escapeHtml(item.provider)}</span></div>`;
        lastProvider = item.provider; lastBrand = '';
      }
      if (item.brand !== lastBrand) {
        html += `<div class="subhead">MARCA: ${escapeHtml(item.brand)}</div>`;
        lastBrand = item.brand;
      }
      html += cardHtml(item, calc);
    });
    html += '</div>';
    els.results.innerHTML = html;
    $$('.edit-btn').forEach(btn => btn.addEventListener('click', () => startEdit(btn.dataset.id)));
    $$('.delete-btn').forEach(btn => btn.addEventListener('click', () => deleteItem(btn.dataset.id)));
  }

  function salePillClass(type){ return state.settings.saleMode === type ? 'pill saleon' : 'pill'; }

  function cardHtml(item, calc){
    return `
      <div class="card">
        <div class="headline">
          <div>
            <div class="name">${escapeHtml(item.model)}${item.variant ? ' · ' + escapeHtml(item.variant) : ''}</div>
            <div class="meta">${escapeHtml(item.provider)} · ${escapeHtml(item.brand)}${item.notes ? ' · ' + escapeHtml(item.notes) : ''}</div>
          </div>
          <div class="sale">
            <div class="label">VENTA</div>
            <div class="value">${money(calc.sale)}</div>
          </div>
        </div>
        <div class="prices">
          <div class="pill"><div class="k">BASE</div><div class="v">${money(calc.base)}</div><div class="s">PROVEEDOR</div></div>
          <div class="${salePillClass('min')}"><div class="k">MÍNIMO</div><div class="v">${money(calc.minPrice)}</div><div class="s">+${money(state.settings.minAdd).replace('$ ','')} · ${pct(calc.pct15)}</div></div>
          <div class="${salePillClass('normal')}"><div class="k">NORMAL</div><div class="v">${money(calc.normalPrice)}</div><div class="s">+${money(state.settings.normalAdd).replace('$ ','')} · ${pct(calc.pct20)}</div></div>
          <div class="${salePillClass('custom')}"><div class="k">PERSONAL</div><div class="v">${money(calc.customPrice)}</div><div class="s">${pct(state.settings.customPct)}</div></div>
          <div class="pill"><div class="k">DÉBITO</div><div class="v">${money(calc.debit)}</div><div class="s">SOBRE VENTA</div></div>
          <div class="pill"><div class="k">CRÉDITO</div><div class="v">${money(calc.credit)}</div><div class="s">SOBRE VENTA</div></div>
          <div class="pill"><div class="k">% +${money(state.settings.minAdd).replace('$ ','')}</div><div class="v">${pct(calc.pct15)}</div><div class="s">EQUIVALENCIA</div></div>
          <div class="pill"><div class="k">% +${money(state.settings.normalAdd).replace('$ ','')}</div><div class="v">${pct(calc.pct20)}</div><div class="s">EQUIVALENCIA</div></div>
        </div>
        <div class="cardfoot">
          <div class="small">ACTUALIZADO: ${escapeHtml(item.updatedAt || '')}</div>
          <div class="actions">
            <button class="btn ghost edit-btn" data-id="${item.id}" type="button">EDITAR</button>
            <button class="btn danger delete-btn" data-id="${item.id}" type="button">ELIMINAR</button>
          </div>
        </div>
      </div>`;
  }

  function escapeHtml(v){ return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

  function resetForm(){
    state.editingId = null;
    els.provider.value = ''; els.brand.value = ''; els.model.value = ''; els.variant.value = ''; els.supplierPrice.value = ''; els.notes.value = '';
    els.formTitle.textContent = 'AGREGAR EQUIPO';
    els.formModeHint.textContent = 'MANUAL';
    els.cancelEdit.classList.add('hidden');
  }

  function startEdit(id){
    const item = state.items.find(x => x.id === id); if (!item) return;
    state.editingId = id;
    els.provider.value = item.provider || '';
    els.brand.value = item.brand || '';
    els.model.value = item.model || '';
    els.variant.value = item.variant || '';
    els.supplierPrice.value = item.supplierPrice || '';
    els.notes.value = item.notes || '';
    els.formTitle.textContent = 'EDITAR EQUIPO';
    els.formModeHint.textContent = 'ACTIVO';
    els.cancelEdit.classList.remove('hidden');
    window.scrollTo({top:0, behavior:'smooth'});
  }

  function saveFormItem(){
    const payload = {
      provider: up(els.provider.value), brand: up(els.brand.value), model: up(els.model.value), variant: up(els.variant.value),
      supplierPrice: round2(els.supplierPrice.value), notes: up(els.notes.value), updatedAt: nowText()
    };
    if (!payload.provider || !payload.brand || !payload.model || !payload.supplierPrice) {
      alert('PON PROVEEDOR, MARCA, MODELO Y PRECIO BASE.'); return;
    }
    if (state.editingId) {
      const idx = state.items.findIndex(x => x.id === state.editingId);
      if (idx >= 0) state.items[idx] = Object.assign({}, state.items[idx], payload);
    } else {
      payload.id = cryptoRandom();
      state.items.unshift(payload);
    }
    saveItems();
    buildProviderFilter();
    resetForm();
    render();
  }

  function deleteItem(id){
    const item = state.items.find(x => x.id === id);
    if (!item) return;
    if (!confirm(`ELIMINAR ${item.model}${item.variant ? ' · ' + item.variant : ''}?`)) return;
    state.items = state.items.filter(x => x.id !== id);
    saveItems();
    render();
  }

  // events
  els.search.addEventListener('input', render);
  els.providerFilter.addEventListener('change', render);
  els.clearSearch.addEventListener('click', () => { els.search.value=''; render(); els.search.focus(); });
  els.saveSettings.addEventListener('click', () => { readSettingsFromUi(); saveSettings(); updateModeButtons(); render(); });
  els.recalcAll.addEventListener('click', () => { readSettingsFromUi(); updateModeButtons(); render(); });
  $$('.modebtn').forEach(btn => btn.addEventListener('click', () => { readSettingsFromUi(); state.settings.saleMode = btn.dataset.mode; saveSettings(); updateModeButtons(); render(); }));
  ['minAdd','normalAdd','customPct','debitPct','creditPct','commVatPct'].forEach(id => els[id].addEventListener('input', () => { readSettingsFromUi(); updateModeButtons(); render(); }));
  els.saveItem.addEventListener('click', saveFormItem);
  els.cancelEdit.addEventListener('click', resetForm);

  syncSettingsToUi();
  buildProviderFilter();
  resetForm();
  render();
})();
</script>
</body>
</html>
